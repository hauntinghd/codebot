server {
    listen 80;
    server_name chatbot.nyptidindustries.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chatbot.nyptidindustries.com;

    ssl_certificate     /etc/letsencrypt/live/chatbot.nyptidindustries.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatbot.nyptidindustries.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # ============================================================
    # API PROXY — MUST BE FIRST (prevents SPA from swallowing /api)
    # ============================================================
    location ^~ /codebot/api/ {
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Safe defaults for streaming/endpoints
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ============================================================
    # BACKEND HEALTH (explicit)
    # ============================================================
    location = /codebot/health {
        proxy_pass http://127.0.0.1:8000/codebot/health;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ============================================================
    # STATIC ASSETS (NO HTML FALLBACK)
    # ============================================================
    location ^~ /codebot/assets/ {
        alias /home/omatic657/aicoderbot/static/app-new/assets/;
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ============================================================
    # FRONTEND SPA
    # ============================================================
    location /codebot/ {
        alias /home/omatic657/aicoderbot/static/app-new/;
        index index.html;
        try_files $uri $uri/ /codebot/index.html;
    }

    # ============================================================
    # ROOT REDIRECT
    # ============================================================
    location = / {
        return 302 /codebot/;
    }
}
