# Nginx config to serve /codebot and proxy API to local backend
# Save this to /etc/nginx/sites-available/chatbot.nyptidindustries.com and enable symlink

server {
    listen 80;
    server_name chatbot.nyptidindustries.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chatbot.nyptidindustries.com;

    # TLS certificates (use certbot to obtain and this path is the standard)
    ssl_certificate /etc/letsencrypt/live/chatbot.nyptidindustries.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatbot.nyptidindustries.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Root for built frontend static files
    root /var/www/codebot;
    index index.html;

    # Serve frontend static assets at /codebot/
    location /codebot/ {
        try_files $uri $uri/ /codebot/index.html;
    }

    # Proxy API requests to the FastAPI backend (running on localhost:8080)
    location /codebot/api/ {
        proxy_pass http://127.0.0.1:8080/codebot/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
    }

    # Optional: proxy preview assets (if your app uses preview-proxy)
    location /codebot/api/preview-proxy/ {
        proxy_pass http://127.0.0.1:8080/codebot/api/preview-proxy/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Websocket / SSE proxying (if used)
    location /codebot/api/architecture/projects/ {
        proxy_pass http://127.0.0.1:8080/codebot/api/architecture/projects/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        chunked_transfer_encoding on;
    }

    # Security headers (minimal)
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
}
