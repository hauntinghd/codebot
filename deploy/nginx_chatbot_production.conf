# CodeBot - Production Nginx for chatbot.nyptidindustries.com
# Backend: port 8000 | Frontend: port 3000
# Install: sudo cp deploy/nginx_chatbot_production.conf /etc/nginx/sites-available/chatbot
# Enable:  sudo ln -sf /etc/nginx/sites-available/chatbot /etc/nginx/sites-enabled/
# Test:    sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name chatbot.nyptidindustries.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chatbot.nyptidindustries.com;

    ssl_certificate /etc/letsencrypt/live/chatbot.nyptidindustries.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chatbot.nyptidindustries.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Redirect root to /codebot/
    location = / {
        return 302 https://$host/codebot/;
    }

    # Redirect /dashboard, /login, etc. -> /codebot/dashboard, /codebot/login, etc.
    location ~ ^/(dashboard|login|builder|settings|account|project|terms)(/.*)?$ {
        return 302 https://$host/codebot$uri;
    }

    # Catch-all: any other path without /codebot prefix -> /codebot/
    location / {
        return 302 https://$host/codebot/;
    }

    # API -> Backend (FastAPI on port 8000)
    location /codebot/api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SSE / streaming (chat) - no buffering
    location /codebot/api/chats/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Frontend -> Next.js (port 3000)
    location /codebot/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    access_log /var/log/nginx/chatbot-access.log;
    error_log /var/log/nginx/chatbot-error.log warn;
}
