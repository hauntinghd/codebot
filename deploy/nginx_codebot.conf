# Nginx config for CodeBot app reverse-proxying to local FastAPI backend
# Save this file to /etc/nginx/sites-available/codebot and symlink to sites-enabled
# Then nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name chatbot.nyptidindustries.com; # adjust to your domain

    # Redirect root to /codebot/
    location = / {
        return 302 /codebot/;
    }

    # Serve the favicon directly if present in the static folder
    location = /favicon.ico {
        try_files /codebot/favicon.ico =404;
    }

    # Proxy all /codebot/ requests to the backend FastAPI (uvicorn)
    location /codebot/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # Optional: healthcheck path
    location /codebot/health {
        proxy_pass http://127.0.0.1:8080/codebot/health;
    }

    # Recommended: block access to hidden files
    location ~ /\.|/\.env {
      deny all;
    }

    # Basic logging (adjust paths as you like)
    access_log /var/log/nginx/codebot-access.log;
    error_log /var/log/nginx/codebot-error.log warn;
}
